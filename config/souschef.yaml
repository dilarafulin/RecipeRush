behaviors:
  SousChefBehavior:
    trainer_type: ppo
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 5000
    keep_checkpoints: 5
    checkpoint_interval: 50000
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      num_layers: 2
      hidden_units: 128
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0